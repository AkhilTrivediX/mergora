name: Documentation issue
description: Report inaccurate, missing, inaccessible, or stale documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: input
    id: url
    attributes:
      label: Page or source URL
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Quote only the minimum necessary text and explain why it is inaccurate or unusable.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected correction
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Referenced exact package/site version
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I checked that this does not disclose a vulnerability or credential.
          required: true
