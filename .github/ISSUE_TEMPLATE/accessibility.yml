name: Accessibility defect
description: Report a barrier without being asked to disclose a disability.
title: "[Accessibility]: "
labels:
  - accessibility
body:
  - type: markdown
    attributes:
      value: Describe the observable barrier and task. Personal disability information is not required.
  - type: input
    id: surface
    attributes:
      label: Component, kit, command, or page
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Exact version or commit
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: User task and barrier
      description: State the intended task, steps, and observable result.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Relevant environment
      description: Include only details useful to reproduce, such as OS, browser, assistive technology/input, viewport, zoom, locale, and direction.
    validations:
      required: true
  - type: textarea
    id: expectation
    attributes:
      label: Expected accessible behavior
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Workaround, if any
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials and personal information that is not needed to reproduce the barrier.
          required: true
