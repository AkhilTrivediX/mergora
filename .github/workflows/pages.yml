name: Deploy Pages

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
      - name: Enable pinned pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.14.0 --activate
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Build static site and registry
        env:
          MERGORA_BASE_PATH: /mergora
        run: pnpm build
      - name: Upload validated Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0


# Post-deploy root/nested/registry/assets/404/search probes remain a required
# implementation gate before this workflow can support a release claim.
# Automatic main deployment is enabled only after the P7 site gate replaces
# the honest P0 scaffold with the real public discovery experience.
