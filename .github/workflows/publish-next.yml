name: Publish prerelease

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Exact verified commit SHA or protected prerelease tag
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-next
  cancel-in-progress: false

jobs:
  publish:
    environment: npm-next
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out requested candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
      - name: Enable pinned pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.14.0 --activate
      - name: Require committed package identity
        shell: bash
        run: test -f config/public-packages.json
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Reverify candidate
        run: pnpm release:verify
      - name: Publish under next
        run: pnpm publish:next

# No NODE_AUTH_TOKEN is used. This remains non-operational until the npm-next
# environment, trusted-publisher binding, package map, and publish script exist.
