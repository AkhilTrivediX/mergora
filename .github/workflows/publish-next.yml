name: Publish prerelease

on:
  workflow_dispatch:
    inputs:
      commit:
        description: Exact protected main commit SHA already verified by release-verify.yml
        required: true
        type: string
      verification_run_id:
        description: Successful release-verify.yml Actions run containing immutable candidate evidence
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-next
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'AkhilTrivediX/mergora' && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.ref_protected
    environment: npm-next
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      MERGORA_CANDIDATE_COMMIT: ${{ inputs.commit }}
      MERGORA_RELEASE_ENVIRONMENT: npm-next
      MERGORA_VERIFICATION_RUN_ID: ${{ inputs.verification_run_id }}
    steps:
      - name: Confirm immutable protected dispatch identity
        shell: bash
        env:
          CANDIDATE_COMMIT: ${{ inputs.commit }}
          VERIFICATION_RUN_ID: ${{ inputs.verification_run_id }}
        run: |
          set -euo pipefail
          [[ "$CANDIDATE_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$VERIFICATION_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          test "$CANDIDATE_COMMIT" = "$GITHUB_SHA"
      - name: Check out requested candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Download immutable release-verification evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ github.token }}
          name: release-candidate-${{ inputs.commit }}
          path: artifacts
          repository: ${{ github.repository }}
          run-id: ${{ inputs.verification_run_id }}
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
          registry-url: https://registry.npmjs.org
      - name: Enable pinned pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.14.0 --activate
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Execute guarded next transaction
        env:
          MERGORA_GITHUB_TOKEN: ${{ github.token }}
        run: pnpm publish:next

# This workflow has no long-lived npm credential. The guarded command rejects
# private/0.0.0 packages, missing bootstrap/trusted-publisher state, mismatched
# evidence, and unsafe channel promotion before attempting any npm mutation.
