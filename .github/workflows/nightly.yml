name: Nightly quality matrix

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-matrix:
    name: Full matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
      - name: Enable pinned pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.14.0 --activate
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Run repository aggregate
        run: pnpm check
      - name: Run full browser suite
        run: pnpm test:browser
      - name: Run visual suite
        run: pnpm test:visual
      - name: Run accessibility suite
        run: pnpm test:a11y
      - name: Run end-to-end suite
        run: pnpm test:e2e
      - name: Run consumer suite
        run: pnpm test:consumer
      - name: Run compatibility suite
        run: pnpm test:compat

# Deduplicated issue creation is intentionally not enabled in the P0 baseline.
# It requires the labels and isolated issues:write job to be configured and
# exercised before the nightly operational gate can pass.
# The UTC schedule is enabled with the real P9 matrix; scheduling fail-closed
# placeholder commands would create noise without quality evidence.
