name: Nightly quality matrix

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-matrix:
    name: Full matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
      - name: Enable pinned pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.14.0 --activate
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Install pinned browser engines and Linux dependencies
        if: runner.os == 'Linux'
        run: pnpm exec playwright install --with-deps chromium firefox webkit
      - name: Install pinned browser engines
        if: runner.os != 'Linux'
        run: pnpm exec playwright install chromium firefox webkit
      - name: Run repository aggregate
        run: pnpm check
      - name: Run full browser suite
        run: pnpm test:browser
      - name: Run visual suite
        run: pnpm test:visual
      - name: Run accessibility suite
        run: pnpm test:a11y
      - name: Run end-to-end suite
        run: pnpm test:e2e
      - name: Run consumer suite
        run: pnpm test:consumer
      - name: Run compatibility suite
        run: pnpm test:compat

  policy-security-performance:
    name: Policy, supply chain, links, and performance
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
      - name: Enable pinned pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.14.0 --activate
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chromium for Lighthouse
        run: pnpm exec playwright install --with-deps chromium
      - name: Capture dependency freshness without treating updates as defects
        shell: bash
        run: |
          set +e
          pnpm outdated --recursive --format json > "$RUNNER_TEMP/mergora-dependency-freshness.json"
          status=$?
          set -e
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi
      - name: Upload dependency freshness report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-freshness-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/mergora-dependency-freshness.json
          if-no-files-found: warn
          retention-days: 14
      - name: Reject production moderate, high, and critical advisories
        run: pnpm audit:production
      - name: Reject high and critical advisories across the full toolchain
        run: pnpm audit:high
      - name: Enforce production dependency and bundled asset licenses
        run: pnpm licenses:check
      - name: Validate documentation and local links
        run: pnpm docs:validate
      - name: Build production static site and Quality Lab
        env:
          MERGORA_BASE_PATH: /mergora
        run: pnpm build
      - name: Assemble precompiled Quality Lab specimens
        run: node scripts/assemble-quality-lab.mjs
      - name: Verify production route and Lighthouse budgets
        run: pnpm test:performance
      - name: Confirm policy verification does not edit tracked source
        run: git diff --exit-code

  compatibility-artifacts:
    name: Build compatibility artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up release Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.12.0
      - name: Enable pinned pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.14.0 --activate
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Build compatibility packages
        shell: bash
        run: |
          pnpm --filter mergora-schema build
          pnpm --filter mergora-contracts build
          pnpm --filter mergora-registry build
          pnpm --filter mergora build
          pnpm --filter mergora-ui build
      - name: Pack exact compatibility artifacts
        run: >-
          node scripts/compat-pack-artifacts.mjs
          --output "${{ runner.temp }}/mergora-compat-artifacts"
      - name: Upload compatibility artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mergora-compat-artifacts
          path: ${{ runner.temp }}/mergora-compat-artifacts
          if-no-files-found: error
          retention-days: 7

  compatibility-frameworks:
    name: Compatibility (${{ matrix.profile }})
    needs: compatibility-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        profile:
          - next14-r18-ts59
          - next14-r18-ts60
          - next16-r19-ts59
          - next16-r19-ts60
          - vite-r18-ts59
          - vite-r18-ts60
          - vite-r19-ts59
          - vite-r19-ts60
          - vite7-r19-ts60
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up release Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.12.0
      - name: Install current supported npm major
        run: npm install --global npm@11.17.0
      - name: Download compatibility artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mergora-compat-artifacts
          path: ${{ runner.temp }}/mergora-compat-artifacts
      - name: Run framework, React, and TypeScript consumer
        run: >-
          node scripts/compat-consumer.mjs
          --profile "${{ matrix.profile }}"
          --artifacts "${{ runner.temp }}/mergora-compat-artifacts"
          --expected-node 24.12.0
          --expected-os linux

  compatibility-node-os:
    name: Compatibility (${{ matrix.platform }}, Node ${{ matrix.node }})
    needs: compatibility-artifacts
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 22.14.0
            os: ubuntu-latest
            platform: linux
          - node: 24.12.0
            os: ubuntu-latest
            platform: linux
          - node: 22.14.0
            os: windows-latest
            platform: win32
          - node: 24.12.0
            os: windows-latest
            platform: win32
          - node: 22.14.0
            os: macos-latest
            platform: darwin
          - node: 24.12.0
            os: macos-latest
            platform: darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up compatibility Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
      - name: Download compatibility artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mergora-compat-artifacts
          path: ${{ runner.temp }}/mergora-compat-artifacts
      - name: Run Node and operating-system consumer
        run: >-
          node scripts/compat-consumer.mjs
          --profile node-os-smoke
          --artifacts "${{ runner.temp }}/mergora-compat-artifacts"
          --expected-node "${{ matrix.node }}"
          --expected-os "${{ matrix.platform }}"

  compatibility-managers:
    name: Compatibility (${{ matrix.manager }} ${{ matrix.version }})
    needs: compatibility-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: manager-npm
            manager: npm
            version: 11.17.0
          - profile: manager-pnpm-pinned
            manager: pnpm
            version: 11.14.0
          - profile: manager-pnpm-current
            manager: pnpm
            version: 11.15.0
          - profile: manager-yarn
            manager: yarn
            version: 4.17.1
          - profile: manager-bun
            manager: bun
            version: 1.3.14
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up release Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.12.0
      - name: Install npm lane
        if: matrix.manager == 'npm'
        run: npm install --global npm@11.17.0
      - name: Enable Corepack manager lane
        if: matrix.manager == 'pnpm' || matrix.manager == 'yarn'
        shell: bash
        run: |
          corepack enable
          corepack prepare "${{ matrix.manager }}@${{ matrix.version }}" --activate
      - name: Install Bun lane
        if: matrix.manager == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Download compatibility artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mergora-compat-artifacts
          path: ${{ runner.temp }}/mergora-compat-artifacts
      - name: Run package-manager consumer
        run: >-
          node scripts/compat-consumer.mjs
          --profile "${{ matrix.profile }}"
          --artifacts "${{ runner.temp }}/mergora-compat-artifacts"
          --expected-node 24.12.0
          --expected-os linux

  report-nightly:
    name: Report scheduled nightly result
    if: always() && github.event_name == 'schedule'
    needs:
      - full-matrix
      - policy-security-performance
      - compatibility-artifacts
      - compatibility-frameworks
      - compatibility-node-os
      - compatibility-managers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      issues: write
    env:
      NIGHTLY_COMPATIBILITY_ARTIFACTS: ${{ needs.compatibility-artifacts.result }}
      NIGHTLY_COMPATIBILITY_FRAMEWORKS: ${{ needs.compatibility-frameworks.result }}
      NIGHTLY_COMPATIBILITY_MANAGERS: ${{ needs.compatibility-managers.result }}
      NIGHTLY_COMPATIBILITY_NODE_OS: ${{ needs.compatibility-node-os.result }}
      NIGHTLY_FULL_MATRIX: ${{ needs.full-matrix.result }}
      NIGHTLY_POLICY: ${{ needs.policy-security-performance.result }}
    steps:
      - name: Create, update, or resolve the deduplicated nightly issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const results = [
              { id: "full-matrix", result: process.env.NIGHTLY_FULL_MATRIX, subsystem: "full-matrix" },
              { id: "policy-security-performance", result: process.env.NIGHTLY_POLICY, subsystem: "policy" },
              { id: "compatibility-artifacts", result: process.env.NIGHTLY_COMPATIBILITY_ARTIFACTS, subsystem: "compatibility" },
              { id: "compatibility-frameworks", result: process.env.NIGHTLY_COMPATIBILITY_FRAMEWORKS, subsystem: "compatibility" },
              { id: "compatibility-node-os", result: process.env.NIGHTLY_COMPATIBILITY_NODE_OS, subsystem: "compatibility" },
              { id: "compatibility-managers", result: process.env.NIGHTLY_COMPATIBILITY_MANAGERS, subsystem: "compatibility" },
            ];
            const unsuccessful = results.filter(({ result }) => result !== "success");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Nightly quality matrix failure";
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = openIssues.find((issue) => issue.title === title && issue.pull_request === undefined);

            if (unsuccessful.length === 0) {
              if (existing !== undefined) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body: `Recovered in [scheduled run ${context.runNumber}](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}) at \`${context.sha}\`.`,
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  state: "closed",
                  state_reason: "completed",
                });
              }
              core.info("The scheduled nightly matrix passed; no failure issue is open.");
              return;
            }

            const labelDefinitions = {
              "nightly-failure": { color: "B60205", description: "A scheduled nightly quality gate is failing" },
              "subsystem:compatibility": { color: "5319E7", description: "Compatibility or consumer matrix" },
              "subsystem:full-matrix": { color: "1D76DB", description: "Cross-platform browser and consumer matrix" },
              "subsystem:policy": { color: "D4C5F9", description: "Policy, supply-chain, links, or performance" },
            };
            const subsystemLabels = [...new Set(unsuccessful.map(({ subsystem }) => `subsystem:${subsystem}`))];
            const labels = ["nightly-failure", ...subsystemLabels];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, name: label, ...labelDefinitions[label] });
              }
            }

            const successfulRuns = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: "nightly.yml",
              status: "success",
              per_page: 1,
            });
            const lastGood = successfulRuns.data.workflow_runs[0];
            const lastGoodText = lastGood === undefined
              ? "No successful scheduled run is recorded yet."
              : `[\`${lastGood.head_sha}\`](${lastGood.html_url}) from ${lastGood.created_at}.`;
            const rows = results.map(({ id, result }) => `| \`${id}\` | ${result} |`).join("\n");
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              "A scheduled nightly quality run needs attention.",
              "",
              `- Failing run: [${context.runNumber}](${runUrl})`,
              `- Candidate commit: [\`${context.sha}\`](${context.serverUrl}/${owner}/${repo}/commit/${context.sha})`,
              `- Last known good: ${lastGoodText}`,
              "",
              "| Lane | Result |",
              "| --- | --- |",
              rows,
              "",
              "This issue contains only trusted job status. Inspect retained artifacts and the linked run for details.",
            ].join("\n");

            if (existing === undefined) {
              await github.rest.issues.create({ owner, repo, title, body, labels });
            } else {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
                labels,
              });
            }
