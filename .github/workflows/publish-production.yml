name: Publish stable release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Protected immutable v<SemVer> Stable tag selected as the workflow ref
        required: true
        type: string
      commit:
        description: Exact tag commit SHA already verified by release-verify.yml
        required: true
        type: string
      verification_run_id:
        description: Successful release-verify.yml Actions run containing immutable candidate evidence
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-production
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'AkhilTrivediX/mergora' && github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/') && github.ref_name == inputs.tag && github.ref_protected
    environment: npm-production
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      MERGORA_CANDIDATE_COMMIT: ${{ inputs.commit }}
      MERGORA_RELEASE_ENVIRONMENT: npm-production
      MERGORA_RELEASE_TAG: ${{ inputs.tag }}
      MERGORA_VERIFICATION_RUN_ID: ${{ inputs.verification_run_id }}
    steps:
      - name: Confirm immutable protected dispatch identity
        shell: bash
        env:
          CANDIDATE_COMMIT: ${{ inputs.commit }}
          RELEASE_TAG: ${{ inputs.tag }}
          VERIFICATION_RUN_ID: ${{ inputs.verification_run_id }}
        run: |
          set -euo pipefail
          [[ "$CANDIDATE_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$VERIFICATION_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          test "$CANDIDATE_COMMIT" = "$GITHUB_SHA"
          test "$GITHUB_REF" = "refs/tags/$RELEASE_TAG"
      - name: Check out protected tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Download immutable release-verification evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ github.token }}
          name: release-candidate-${{ inputs.commit }}
          path: artifacts
          repository: ${{ github.repository }}
          run-id: ${{ inputs.verification_run_id }}
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
          registry-url: https://registry.npmjs.org
      - name: Enable pinned pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.14.0 --activate
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Execute guarded Stable transaction
        env:
          MERGORA_GITHUB_TOKEN: ${{ github.token }}
        run: pnpm publish:production

# Stable remains fail-closed until the evidence summary carries exact manual,
# independent-review, and completion-manifest authorization and npm can support
# coherent post-verification channel promotion without a long-lived token.
