name: Publish stable release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Protected immutable Stable tag
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-production
  cancel-in-progress: false

jobs:
  publish:
    environment: npm-production
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out protected tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          fetch-depth: 0
      - name: Confirm exact immutable tag
        shell: bash
        run: |
          test "$(git describe --tags --exact-match HEAD)" = "${{ inputs.tag }}"
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
      - name: Enable pinned pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.14.0 --activate
      - name: Require committed package identity
        shell: bash
        run: test -f config/public-packages.json
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Reverify protected release
        run: pnpm release:verify
      - name: Publish dependency-ordered Stable set
        run: pnpm publish:production

# Stable publication remains non-operational until protected-tag invocation,
# required-check verification, npm-production approval, trusted publishing,
# remote verification, coherent dist-tag movement, and release assembly are
# implemented and exercised. This baseline has no long-lived npm token.
